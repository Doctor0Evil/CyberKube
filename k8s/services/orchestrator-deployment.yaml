apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberkube-orchestrator
  namespace: cyberkube
  labels:
    app: cyberkube
    component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberkube
      component: orchestrator
  template:
    metadata:
      labels:
        app: cyberkube
        component: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: your-registry/cyberkube-orchestrator:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cyberkube-config
          env:
            - name: CYBERKUBE_SERVICE
              value: "orchestrator"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cyberkube-orchestrator-svc
  namespace: cyberkube
spec:
  selector:
    app: cyberkube
    component: orchestrator
  ports:
    - name: http
      port: 80
      targetPort: 8080
