apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberkube-health-plane
  namespace: cyberkube
  labels:
    app: cyberkube
    component: health-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyberkube
      component: health-plane
  template:
    metadata:
      labels:
        app: cyberkube
        component: health-plane
    spec:
      containers:
        - name: health-plane
          image: your-registry/cyberkube-health-plane:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cyberkube-config
          env:
            - name: CYBERKUBE_SERVICE
              value: "health-plane"
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cyberkube-health-plane-svc
  namespace: cyberkube
spec:
  selector:
    app: cyberkube
    component: health-plane
  ports:
    - name: http
      port: 80
      targetPort: 8081
