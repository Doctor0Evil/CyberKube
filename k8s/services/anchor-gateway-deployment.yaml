apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberkube-anchor-gateway
  namespace: cyberkube
  labels:
    app: cyberkube
    component: anchor-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberkube
      component: anchor-gateway
  template:
    metadata:
      labels:
        app: cyberkube
        component: anchor-gateway
    spec:
      containers:
        - name: anchor-gateway
          image: your-registry/cyberkube-anchor-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cyberkube-config
          env:
            - name: CYBERKUBE_SERVICE
              value: "anchor-gateway"
            - name: BOSTROM_ADDRESS
              value: "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
          ports:
            - name: http
              containerPort: 8083
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cyberkube-anchor-gateway-svc
  namespace: cyberkube
spec:
  selector:
    app: cyberkube
    component: anchor-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8083
